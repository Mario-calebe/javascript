<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperatuda</title>
</head>
<body>
    <h1>Conversor de Temperaturas</h1>
    <button onclick="converter()" style="padding: 20px; margin-bottom: 10px;">Converter</button>
    <div id="res">Clique no botão acima para iniciar a conversão🤗</div>
</body>
<script>
    var res = window.document.getElementById('res')
    function converter() {
        var celsius = Number(prompt(`Digite uma temperatura em ˚C (celsius)`))
        var kelvin = celsius + 273.15
        var fahrenheit = celsius * 1.8 + 32
        res.innerHTML = `<h1>A temperatura de ${celsius.toLocaleString('pt-br')}˚C, corresponte a... </h1> <hr>`
        res.innerHTML += `<p>${kelvin.toLocaleString('pt-br')} K (Kelvin)</p>`
        res.innerHTML += `<p>${fahrenheit.toLocaleString('pt-br')}˚F (F ahrenheit)</p>`
    }
</script>
</html>
