<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dados</title>
</head>
<body>
    <h1>Trabalhando com Dados</h1>
    <button style="padding: 30px;" onclick="Clicou()">Clique em mim, please!</button>
</body>

<script>
    function Clicou() {
        var nome = window.prompt('Qual é seu nome?')
        alert(`Olá, Pequeno Garfanhoto (${nome}), Prazer em lhe conhecer!`)
    }
</script>
</html>
