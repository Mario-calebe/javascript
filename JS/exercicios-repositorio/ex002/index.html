<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Função</title>
</head>
<body>
    <h1>Interagindo com Button</h1>
    <button style="padding: 30px; text-decoration: underline;" onclick="clicou()">Clique em mim!</button>
</body>
<script>
    function clicou() {
        var res = window.prompt('Porque você clicou em mim?')
        if (res != 'kklfgh'){
            alert('Você é do mal!')
        }
    }
</script>
</html>
