<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Números com JavaScript</title>
</head>
<body>
    <h1>Média do aluno v1.0</h1>
    <button onclick="calcular()" style="padding: 30px;">Calcular Média</button>
    <div id="res">Resultado aparece aqui...</div>
</body>
<script>
    function calcular() {
        var res = window.document.getElementById('res')
        var aluno = window.prompt('Qual é o nome do aluno?')
        var nota1 = Number(window.prompt(`Qual foi a primeira nota de ${aluno}`))
        var nota2 = Number(window.prompt(`Além de ${nota1}, Qual foi a segunda nota de ${aluno}?`))
        res.innerHTML = `<p>Calculando a Média final de <mark>${aluno}</mark>.</p>`
        res.innerHTML += `<p>As notas obtidas foram de <mark>${nota1} e ${nota2}</mark>.</p>`
        res.innerHTML += `A média obtida foi de ${(nota1 + nota2) / 2}`
    }
</script>
</html>
