<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistema de Multas</h1>
    <label for="itxtvel">Velocidade do veículo</label>
    <input type="number" name="txtvel" id="itxtvel">
    <label for="itxtvel">Km/h</label>
    <input type="button" value="Verificar" onclick="Verificar()">
    <div id="res">

    </div>
</body>

<script>
    var txtv = window.document.getElementById('itxtvel')
    var res = window.document.querySelector('#res')
    
    function Verificar() {
        var vel = Number(txtv.value)
        res.innerHTML = `<p>Sua velocidade atual é de <strong>${vel}Km/h</strong></p>` 
        if (vel > 300) {
            res.innerHTML += `<p>WoWWW, calma ai meu camarada! Você está BEEEEEM rapido</p>`
        }

        res.innerHTML += `<p>Dirija sempre com cinto de segurança!</p>`
    }
</script>
</html>
